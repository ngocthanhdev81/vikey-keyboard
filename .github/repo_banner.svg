<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="50%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0F1F35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle accent line top -->
  <rect y="0" width="1280" height="3" fill="#FFB300" opacity="0.6"/>

  <!-- Decorative glow column -->
  <rect x="540" y="0" width="200" height="320" fill="url(#glow)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.04" fill="#FFFFFF">
    <circle cx="60" cy="60" r="1.5"/><circle cx="140" cy="60" r="1.5"/>
    <circle cx="220" cy="60" r="1.5"/><circle cx="300" cy="60" r="1.5"/>
    <circle cx="380" cy="60" r="1.5"/><circle cx="460" cy="60" r="1.5"/>
    <circle cx="60" cy="140" r="1.5"/><circle cx="140" cy="140" r="1.5"/>
    <circle cx="220" cy="140" r="1.5"/><circle cx="300" cy="140" r="1.5"/>
    <circle cx="380" cy="140" r="1.5"/><circle cx="460" cy="140" r="1.5"/>
    <circle cx="60" cy="220" r="1.5"/><circle cx="140" cy="220" r="1.5"/>
    <circle cx="220" cy="220" r="1.5"/><circle cx="300" cy="220" r="1.5"/>
    <circle cx="380" cy="220" r="1.5"/><circle cx="460" cy="220" r="1.5"/>
  </g>

  <!-- VK Logo group centered vertically at y=160 -->
  <g transform="translate(100, 160)">
    <!-- Glow behind logo -->
    <circle cx="58" cy="0" r="48" fill="#FFB300" opacity="0.06"/>

    <!-- V letter -->
    <path d="M33,-42 L45,10 L45,10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M45,10 L57,-42" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- K letter -->
    <path d="M68,-42 L68,10" stroke="#FFB300" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M68,-18 L82,-32" stroke="#FFB300" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M68,-18 L82,-4" stroke="#FFB300" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Separator line -->
  <line x1="190" y1="120" x2="190" y2="200" stroke="#FFB300" stroke-width="2" opacity="0.3"/>

  <!-- Text -->
  <text x="220" y="145" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-1">ViKey</text>
  <text x="220" y="190" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="400" fill="#8899AA" letter-spacing="1">Vietnamese Telex Keyboard for Android</text>

  <!-- Badge -->
  <g transform="translate(220, 215)">
    <rect x="-2" y="-12" width="210" height="24" rx="12" fill="none" stroke="#FFB300" stroke-width="1" opacity="0.5"/>
    <text x="103" y="5" font-family="monospace" font-size="12" fill="#FFB300" text-anchor="middle" opacity="0.8">Algorithmic Telex Engine</text>
  </g>

  <!-- Right side decorative arc -->
  <path d="M1100,80 Q1200,160 1100,240" stroke="#FFB300" stroke-width="1" fill="none" opacity="0.08"/>
  <path d="M1150,60 Q1260,160 1150,260" stroke="#FFB300" stroke-width="1" fill="none" opacity="0.05"/>
</svg>
